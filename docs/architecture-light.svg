       SECTION 2 — KERNEL SPACE
  ═══════════════════════════════════════════════════════ -->
  <rect x="24" y="218" width="1152" height="206" fill="#eff6ff" rx="12" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="44" y="210" width="128" height="20" fill="#2563eb" rx="10"/>
  <text x="108" y="223" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="1">KERNEL SPACE</text>

