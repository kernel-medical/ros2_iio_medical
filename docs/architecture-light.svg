  <rect x="0" y="0" width="4" height="64" fill="#2563eb"/>

  <!-- Logo/brand -->
  <rect x="20" y="16" width="32" height="32" fill="#eff6ff" rx="8"/>
  <text x="36" y="37" fill="#2563eb" font-size="16" text-anchor="middle">⚕</text>
  <text x="62" y="30" fill="#0f172a" font-size="14" font-weight="700">kernel-medical</text>
  <text x="62" y="46" fill="#64748b" font-size="11">open source medical Linux infrastructure</text>

  <!-- Title -->
  <text x="600" y="28" fill="#0f172a" font-size="18" font-weight="700" text-anchor="middle">Linux IIO → ROS 2 Medical Acquisition Stack</text>
  <text x="600" y="48" fill="#64748b" font-size="12" text-anchor="middle">Complete open source pipeline · from analog sensor to surgical robot</text>

  <!-- Badges top right -->
  <rect x="1010" y="14" width="80" height="22" fill="#eff6ff" rx="11" stroke="#bfdbfe" stroke-width="1"/>
  <text x="1050" y="29" fill="#1d4ed8" font-size="10" font-weight="600" text-anchor="middle">Apache-2.0</text>
  <rect x="1100" y="14" width="84" height="22" fill="#f0fdf4" rx="11" stroke="#bbf7d0" stroke-width="1"/>
  <text x="1142" y="29" fill="#15803d" font-size="10" font-weight="600" text-anchor="middle">ROS 2 Humble</text>

  <!-- ══════════════════════════════════════════════════════
       SECTION 1 — HARDWARE
  ═══════════════════════════════════════════════════════ -->
  <rect x="24" y="80" width="1152" height="112" fill="#f0fdf4" rx="12" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Section label pill -->
  <rect x="44" y="72" width="100" height="20" fill="#16a34a" rx="10"/>
  <text x="94" y="85" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="1">HARDWARE</text>

  <!-- Chip cards -->
  <!-- ADS1299 -->
  <rect x="44"  y="92" width="198" height="88" fill="#ffffff" rx="10" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="44"  y="92" width="198" height="6"  fill="#16a34a" rx="10"/>
  <rect x="44"  y="96" width="198" height="2"  fill="#16a34a"/>
  <text x="143" y="120" fill="#15803d" font-size="13" font-weight="700" text-anchor="middle">TI ADS1299</text>
  <text x="143" y="138" fill="#374151" font-size="10" text-anchor="middle">8-channel · 24-bit EEG / ECG ADC</text>
  <rect x="64"  y="148" width="68" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="98"  y="160" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">SPI</text>
  <rect x="142" y="148" width="80" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="182" y="160" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">DRDY IRQ</text>

  <!-- MAX86150 -->
  <rect x="258" y="92" width="198" height="88" fill="#ffffff" rx="10" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="258" y="92" width="198" height="6"  fill="#16a34a" rx="10"/>
  <rect x="258" y="96" width="198" height="2"  fill="#16a34a"/>
  <text x="357" y="120" fill="#15803d" font-size="13" font-weight="700" text-anchor="middle">ADI MAX86150</text>
  <text x="357" y="138" fill="#374151" font-size="10" text-anchor="middle">ECG + PPG analog front-end</text>
  <rect x="278" y="148" width="68" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="312" y="160" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">I2C</text>
  <rect x="356" y="148" width="80" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="396" y="160" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">INT pin</text>

  <!-- MAX30102 -->
  <rect x="472" y="92" width="198" height="88" fill="#ffffff" rx="10" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="472" y="92" width="198" height="6"  fill="#16a34a" rx="10"/>
  <rect x="472" y="96" width="198" height="2"  fill="#16a34a"/>
  <text x="571" y="120" fill="#15803d" font-size="13" font-weight="700" text-anchor="middle">ADI MAX30102</text>
  <text x="571" y="138" fill="#374151" font-size="10" text-anchor="middle">SpO₂ · Heart-rate sensor</text>
  <rect x="492" y="148" width="68" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="526" y="160" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">I2C</text>
  <rect x="570" y="148" width="80" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="610" y="160" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">INT pin</text>

  <!-- ti-ads1298 -->
  <rect x="686" y="92" width="198" height="88" fill="#ffffff" rx="10" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="686" y="92" width="198" height="6"  fill="#16a34a" rx="10"/>
  <rect x="686" y="96" width="198" height="2"  fill="#16a34a"/>
  <text x="785" y="120" fill="#15803d" font-size="13" font-weight="700" text-anchor="middle">TI ti-ads1298</text>
  <text x="785" y="138" fill="#374151" font-size="10" text-anchor="middle">8-channel · 24-bit ECG ADC</text>
  <rect x="706" y="148" width="68" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="740" y="160" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">SPI</text>
  <rect x="784" y="148" width="80" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="824" y="160" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">DRDY IRQ</text>

  <!-- Any IIO device -->
  <rect x="900" y="92" width="256" height="88" fill="#f8fafc" rx="10" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1028" y="126" fill="#94a3b8" font-size="13" font-weight="600" text-anchor="middle">Any Linux IIO Device</text>
  <text x="1028" y="146" fill="#94a3b8" font-size="10" text-anchor="middle">Standard IIO sysfs interface</text>
  <text x="1028" y="163" fill="#cbd5e1" font-size="9" text-anchor="middle">SPI · I2C · parallel</text>

  <!-- Arrow down -->
  <line x1="600" y1="192" x2="600" y2="212" stroke="#16a34a" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <rect x="616" y="196" width="148" height="14" fill="#f8fafc"/>
  <text x="690" y="207" fill="#64748b" font-size="10" text-anchor="middle">SPI / I2C · hardware interrupt</text>

