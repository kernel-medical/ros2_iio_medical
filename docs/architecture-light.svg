  <rect x="456" y="422" width="290" height="18" fill="#f8fafc"/>
  <text x="600" y="434" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">─── KERNEL  /  USER SPACE ───</text>

