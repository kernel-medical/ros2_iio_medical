  <rect x="44" y="442" width="178" height="20" fill="#dc2626" rx="10"/>
  <text x="133" y="455" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="1">USER SPACE</text>
  <text x="232" y="455" fill="#dc2626" font-size="12" font-weight="700">ros2_iio_medical</text>

  <!-- Star badge -->
  <rect x="978" y="442" width="200" height="20" fill="#fef9c3" rx="10" stroke="#fde047" stroke-width="1"/>
  <text x="1078" y="455" fill="#854d0e" font-size="10" font-weight="600" text-anchor="middle">★ Your open source package</text>

  <!-- iio_bridge card -->
  <rect x="44"  y="464" width="544" height="144" fill="#ffffff" rx="10" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow-md)"/>
  <rect x="44"  y="464" width="544" height="6"   fill="#ef4444" rx="10"/>
  <rect x="44"  y="468" width="544" height="2"   fill="#ef4444"/>
  <text x="316" y="492" fill="#dc2626" font-size="13" font-weight="700" text-anchor="middle">iio_bridge</text>
  <rect x="370" y="480" width="196" height="18" fill="#fef3c7" rx="9" stroke="#fcd34d" stroke-width="1"/>
  <text x="468" y="492" fill="#92400e" font-size="9" font-weight="600" text-anchor="middle">Polling · Prototyping · Low-rate</text>
  <line x1="64" y1="502" x2="570" y2="502" stroke="#fee2e2" stroke-width="1"/>
  <text x="74"  y="520" fill="#6b7280" font-size="10">Reads</text>
  <text x="120" y="520" fill="#b45309" font-size="10" font-weight="600">in_voltageX_raw</text>
  <text x="74"  y="538" fill="#6b7280" font-size="10">Applies</text>
  <text x="120" y="538" fill="#b45309" font-size="10" font-weight="600">in_voltage_scale → mV</text>
  <text x="74"  y="556" fill="#6b7280" font-size="10">Publishes</text>
  <text x="120" y="556" fill="#1d4ed8" font-size="10" font-weight="600">Float64MultiArray</text>
  <text x="74"  y="574" fill="#6b7280" font-size="10">Params</text>
  <text x="120" y="574" fill="#374151" font-size="10">device_path · num_channels · sample_rate_hz</text>
  <text x="316" y="596" fill="#b45309" font-size="9" text-anchor="middle">No kernel buffer setup required</text>

  <!-- iio_triggered_bridge card -->
  <rect x="604" y="464" width="556" height="144" fill="#ffffff" rx="10" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow-md)"/>
  <rect x="604" y="464" width="556" height="6"   fill="#ef4444" rx="10"/>
  <rect x="604" y="468" width="556" height="2"   fill="#ef4444"/>
  <text x="882" y="492" fill="#dc2626" font-size="13" font-weight="700" text-anchor="middle">iio_triggered_bridge</text>
  <rect x="960" y="480" width="178" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="1049" y="492" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">Production · Hardware-timed</text>
  <line x1="624" y1="502" x2="1142" y2="502" stroke="#fee2e2" stroke-width="1"/>
  <text x="630" y="520" fill="#6b7280" font-size="10">epoll_wait() → read() → parse binary sample</text>
  <text x="630" y="538" fill="#6b7280" font-size="10">Auto channel discovery via scan_elements sysfs</text>
  <text x="630" y="556" fill="#15803d" font-size="10" font-weight="600">✓ No timer jitter</text>
  <text x="748" y="556" fill="#15803d" font-size="10" font-weight="600">✓ No missed samples</text>
  <text x="886" y="556" fill="#15803d" font-size="10" font-weight="600">✓ Hardware-timed</text>
  <text x="630" y="574" fill="#6b7280" font-size="10">Supports: signed/unsigned · little/big endian · shift · real bits</text>
  <text x="882" y="596" fill="#b45309" font-size="9" text-anchor="middle">Correct approach for continuous EEG / ECG acquisition</text>

  <!-- Arrow down -->
  <line x1="600" y1="622" x2="600" y2="642" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

