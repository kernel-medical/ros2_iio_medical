  <rect x="990" y="210" width="188" height="20" fill="#fef9c3" rx="10" stroke="#fde047" stroke-width="1"/>
  <text x="1084" y="223" fill="#854d0e" font-size="10" font-weight="600" text-anchor="middle">★ Your upstream contributions</text>

  <!-- IIO Driver card 1 — under review -->
  <rect x="44"  y="232" width="310" height="100" fill="#ffffff" rx="10" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="44"  y="232" width="310" height="6"   fill="#3b82f6" rx="10"/>
  <rect x="44"  y="236" width="310" height="2"   fill="#3b82f6"/>
  <text x="199" y="260" fill="#1d4ed8" font-size="12" font-weight="700" text-anchor="middle">IIO Driver — Under Review</text>
  <rect x="64"  y="267" width="110" height="18" fill="#fef9c3" rx="9" stroke="#fde047" stroke-width="1"/>
  <text x="119" y="279" fill="#854d0e" font-size="9" font-weight="600" text-anchor="middle">★ Your patch</text>
  <text x="64"  y="304" fill="#374151" font-size="10">ads1299.c — 24-bit EEG/ECG driver</text>
  <text x="64"  y="320" fill="#374151" font-size="10">max86150.c — ECG + PPG driver</text>
  <text x="64"  y="332" fill="#94a3b8" font-size="9">lore.kernel.org/linux-iio</text>

  <!-- IIO Driver card 2 — merged -->
  <rect x="370" y="232" width="310" height="100" fill="#ffffff" rx="10" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="370" y="232" width="310" height="6"   fill="#3b82f6" rx="10"/>
  <rect x="370" y="236" width="310" height="2"   fill="#3b82f6"/>
  <text x="525" y="260" fill="#1d4ed8" font-size="12" font-weight="700" text-anchor="middle">IIO Driver — Merged to Mainline</text>
  <rect x="390" y="267" width="116" height="18" fill="#f0fdf4" rx="9" stroke="#86efac" stroke-width="1"/>
  <text x="448" y="279" fill="#15803d" font-size="9" font-weight="600" text-anchor="middle">✓ In Torvalds tree</text>
  <text x="390" y="304" fill="#374151" font-size="10">max30102.c — SpO₂ / heart-rate</text>
  <text x="390" y="320" fill="#374151" font-size="10">ti-ads1298.c — ECG ADC fixes</text>
  <text x="390" y="332" fill="#94a3b8" font-size="9">git.kernel.org/torvalds/linux</text>

  <!-- IIO Subsystem -->
  <rect x="696" y="232" width="460" height="100" fill="#dbeafe" rx="10" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="926" y="262" fill="#1d4ed8" font-size="13" font-weight="700" text-anchor="middle">Linux IIO Subsystem</text>
  <text x="926" y="280" fill="#374151" font-size="10" text-anchor="middle">drivers/iio/ · sysfs interface · triggered buffer · DMA ring</text>
  <text x="926" y="297" fill="#374151" font-size="10" text-anchor="middle">/sys/bus/iio/devices/iio:device0</text>
  <text x="926" y="314" fill="#374151" font-size="10" text-anchor="middle">/dev/iio:device0 · scan_elements · buffer/enable</text>
  <text x="926" y="330" fill="#64748b" font-size="9" text-anchor="middle">DRDY IRQ → IIO trigger → kernel DMA → ring buffer → read()</text>

  <!-- Arrow down -->
  <line x1="600" y1="424" x2="600" y2="444" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
