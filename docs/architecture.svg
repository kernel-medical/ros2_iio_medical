<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="800" height="620" fill="#0d1117" rx="12"/>

  <!-- ── HARDWARE LAYER ── -->
  <rect x="20" y="20" width="760" height="90" fill="#1a1f2e" rx="8" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="45" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">HARDWARE</text>

  <!-- Sensor boxes -->
  <rect x="40"  y="55" width="130" height="40" fill="#1c3a2e" rx="6" stroke="#238636" stroke-width="1"/>
  <text x="105" y="70"  fill="#3fb950" font-size="11" text-anchor="middle">TI ADS1299</text>
  <text x="105" y="84"  fill="#8b949e" font-size="10" text-anchor="middle">8ch 24-bit EEG/ECG</text>

  <rect x="190" y="55" width="130" height="40" fill="#1c3a2e" rx="6" stroke="#238636" stroke-width="1"/>
  <text x="255" y="70"  fill="#3fb950" font-size="11" text-anchor="middle">ADI MAX86150</text>
  <text x="255" y="84"  fill="#8b949e" font-size="10" text-anchor="middle">ECG + PPG</text>

  <rect x="340" y="55" width="130" height="40" fill="#1c3a2e" rx="6" stroke="#238636" stroke-width="1"/>
  <text x="405" y="70"  fill="#3fb950" font-size="11" text-anchor="middle">ADI MAX30102</text>
  <text x="405" y="84"  fill="#8b949e" font-size="10" text-anchor="middle">SpO₂ / Heart-rate</text>

  <rect x="490" y="55" width="130" height="40" fill="#1c3a2e" rx="6" stroke="#238636" stroke-width="1"/>
  <text x="555" y="70"  fill="#3fb950" font-size="11" text-anchor="middle">TI ti-ads1298</text>
  <text x="555" y="84"  fill="#8b949e" font-size="10" text-anchor="middle">8ch ECG ADC</text>

  <text x="680" y="78"  fill="#8b949e" font-size="10" text-anchor="middle">Any Linux</text>
  <text x="680" y="91"  fill="#8b949e" font-size="10" text-anchor="middle">IIO device</text>

  <!-- Arrow down -->
  <line x1="400" y1="110" x2="400" y2="138" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="395,135 405,135 400,143" fill="#30363d"/>
  <text x="415" y="128" fill="#6e7681" font-size="9">SPI / I2C / DRDY IRQ</text>

  <!-- ── KERNEL SPACE ── -->
  <rect x="20" y="145" width="760" height="155" fill="#1a1a2e" rx="8" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="168" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">KERNEL SPACE</text>

  <!-- IIO Driver boxes -->
  <rect x="40"  y="178" width="155" height="50" fill="#161b3a" rx="6" stroke="#388bfd" stroke-width="1"/>
  <text x="117" y="197" fill="#79c0ff" font-size="11" text-anchor="middle" font-weight="bold">IIO Driver</text>
  <text x="117" y="211" fill="#8b949e" font-size="9"  text-anchor="middle">ads1299.c (under review)</text>
  <text x="117" y="222" fill="#8b949e" font-size="9"  text-anchor="middle">max86150.c (under review)</text>

  <rect x="210" y="178" width="155" height="50" fill="#161b3a" rx="6" stroke="#388bfd" stroke-width="1"/>
  <text x="287" y="197" fill="#79c0ff" font-size="11" text-anchor="middle" font-weight="bold">IIO Driver</text>
  <text x="287" y="211" fill="#8b949e" font-size="9"  text-anchor="middle">max30102.c (mainline)</text>
  <text x="287" y="222" fill="#8b949e" font-size="9"  text-anchor="middle">ti-ads1298.c (mainline)</text>

  <!-- IIO subsystem -->
  <rect x="40" y="245" width="490" height="40" fill="#0d2137" rx="6" stroke="#1f6feb" stroke-width="1"/>
  <text x="285" y="261" fill="#388bfd" font-size="11" text-anchor="middle" font-weight="bold">Linux IIO Subsystem</text>
  <text x="285" y="278" fill="#8b949e" font-size="10" text-anchor="middle">sysfs interface · triggered buffer · DMA ring · scan_elements</text>

  <!-- sysfs + dev boxes -->
  <rect x="550" y="178" width="110" height="50" fill="#1a1a2e" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="605" y="197" fill="#e3b341" font-size="10" text-anchor="middle">/sys/bus/iio/</text>
  <text x="605" y="211" fill="#e3b341" font-size="10" text-anchor="middle">devices/</text>
  <text x="605" y="224" fill="#8b949e" font-size="9"  text-anchor="middle">iio:device0</text>

  <rect x="670" y="178" width="100" height="50" fill="#1a1a2e" rx="6" stroke="#30363d" stroke-width="1"/>
  <text x="720" y="200" fill="#e3b341" font-size="10" text-anchor="middle">/dev/iio:</text>
  <text x="720" y="214" fill="#e3b341" font-size="10" text-anchor="middle">device0</text>
  <text x="720" y="227" fill="#8b949e" font-size="9"  text-anchor="middle">DMA buffer</text>

  <!-- Arrow down -->
  <line x1="400" y1="300" x2="400" y2="328" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="395,325 405,325 400,333" fill="#30363d"/>
  <text x="415" y="318" fill="#6e7681" font-size="9">epoll / sysfs read</text>

  <!-- ── THIS PACKAGE ── -->
  <rect x="20" y="335" width="760" height="140" fill="#1f1a1a" rx="8" stroke="#f78166" stroke-width="1.5"/>
  <text x="40"  y="358" fill="#f78166" font-size="11" font-weight="bold" letter-spacing="1">ros2_iio_medical  (this package)</text>
  <text x="700" y="358" fill="#6e7681" font-size="9" text-anchor="end">Apache-2.0</text>

  <!-- iio_bridge node -->
  <rect x="40"  y="367" width="340" height="90" fill="#2d1f1f" rx="6" stroke="#b22222" stroke-width="1"/>
  <text x="210" y="385" fill="#ff7b72" font-size="11" text-anchor="middle" font-weight="bold">iio_bridge</text>
  <text x="210" y="400" fill="#8b949e" font-size="9"  text-anchor="middle">sysfs polling · wall timer · prototyping</text>
  <text x="210" y="415" fill="#8b949e" font-size="9"  text-anchor="middle">reads in_voltageX_raw → applies scale → publishes</text>
  <text x="210" y="430" fill="#6e7681" font-size="9"  text-anchor="middle">params: device_path · num_channels · sample_rate_hz</text>
  <text x="210" y="448" fill="#e3b341" font-size="9"  text-anchor="middle">→ Float64MultiArray (mV)</text>

  <!-- iio_triggered_bridge node -->
  <rect x="400" y="367" width="370" height="90" fill="#2d1f1f" rx="6" stroke="#b22222" stroke-width="1"/>
  <text x="585" y="385" fill="#ff7b72" font-size="11" text-anchor="middle" font-weight="bold">iio_triggered_bridge</text>
  <text x="585" y="400" fill="#8b949e" font-size="9"  text-anchor="middle">epoll on /dev/iio:deviceN · hardware-timed · production</text>
  <text x="585" y="415" fill="#8b949e" font-size="9"  text-anchor="middle">epoll_wait → read → parse binary → publish</text>
  <text x="585" y="430" fill="#6e7681" font-size="9"  text-anchor="middle">channel discovery via scan_elements · signed/unsigned · endian</text>
  <text x="585" y="448" fill="#e3b341" font-size="9"  text-anchor="middle">→ Float64MultiArray (mV)  · no timer jitter · no missed samples</text>

  <!-- Arrow down -->
  <line x1="400" y1="475" x2="400" y2="503" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="395,500 405,500 400,508" fill="#30363d"/>

  <!-- ── ROS2 TOPICS ── -->
  <rect x="20" y="510" width="760" height="90" fill="#1a2a1a" rx="8" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="532" fill="#8b949e" font-size="11" font-weight="bold" letter-spacing="1">ROS 2 TOPICS  →  DOWNSTREAM</text>

  <rect x="40"  y="542" width="155" height="44" fill="#1c3a1c" rx="5" stroke="#238636" stroke-width="1"/>
  <text x="117" y="559" fill="#3fb950" font-size="10" text-anchor="middle">/biosignal/eeg</text>
  <text x="117" y="574" fill="#8b949e" font-size="9"  text-anchor="middle">8ch EEG/ECG (ADS1299)</text>
  <text x="117" y="585" fill="#6e7681" font-size="8"  text-anchor="middle">250 Hz · 24-bit</text>

  <rect x="210" y="542" width="155" height="44" fill="#1c3a1c" rx="5" stroke="#238636" stroke-width="1"/>
  <text x="287" y="559" fill="#3fb950" font-size="10" text-anchor="middle">/biosignal/ecg_ppg</text>
  <text x="287" y="574" fill="#8b949e" font-size="9"  text-anchor="middle">ECG + PPG (MAX86150)</text>
  <text x="287" y="585" fill="#6e7681" font-size="8"  text-anchor="middle">100 Hz</text>

  <rect x="380" y="542" width="155" height="44" fill="#1c3a1c" rx="5" stroke="#238636" stroke-width="1"/>
  <text x="457" y="559" fill="#3fb950" font-size="10" text-anchor="middle">/biosignal/spo2</text>
  <text x="457" y="574" fill="#8b949e" font-size="9"  text-anchor="middle">SpO₂ / HR (MAX30102)</text>
  <text x="457" y="585" fill="#6e7681" font-size="8"  text-anchor="middle">100 Hz</text>

  <rect x="550" y="542" width="220" height="44" fill="#1f2d1f" rx="5" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="556" fill="#8b949e" font-size="10" text-anchor="middle">Robot control · ML inference</text>
  <text x="660" y="570" fill="#8b949e" font-size="10" text-anchor="middle">Logging · Visualisation</text>
  <text x="660" y="583" fill="#6e7681" font-size="9"  text-anchor="middle">rviz2 · rosbag2 · any ROS 2 node</text>

</svg>
